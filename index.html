<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    // LOGIN / SIGNUP page
    <section class="auth-screen">
        <div class="auth-card">
            <div class="brand-row">
                <span class="brand-logo">S</span>
            </div>
        </div>

        <div>
            <button>Student/Admin Login</button>
            <button>Student Signup</button>
        </div>

        <form id="loginForm" class="auth-form">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" name="email" type="email" value="admin@student.edu" required>

            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" value="admin123" required>
            <button type="submit">Login to Dashboard</button>
        </form>
    </section>
</body>
</html>
